<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Huba Huba</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Lobby -->
<div class="lobby" id="lobby">
    <div class="lobby-card">
        <div class="lobby-header">Huba Huba</div>
        <div class="lobby-sub">Join or create a room</div>

        <input id="lobbyName" class="lobby-input" placeholder="Your name" autocomplete="off" />

        <div class="lobby-tabs">
            <button class="lobby-tab active" data-tab="create">Create Room</button>
            <button class="lobby-tab" data-tab="join">Join Room</button>
        </div>

        <div id="lobbyCreate" class="lobby-panel">
            <input id="createRoomName" class="lobby-input" placeholder="Room name" autocomplete="off" />
            <input id="createRoomPassword" class="lobby-input" type="password" placeholder="Password (optional)" autocomplete="off" />
            <button id="createRoomBtn" class="lobby-btn">Create Room</button>
        </div>

        <div id="lobbyJoin" class="lobby-panel hidden">
            <div id="roomList" class="room-list">
                <div class="room-list-empty">Loading rooms...</div>
            </div>
        </div>

        <div id="lobbyError" class="lobby-error hidden"></div>
    </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="app hidden" id="app">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <video class="sidebar-video" autoplay muted loop playsinline>
            <source src="/Assets/bg3.mp4" type="video/mp4">
        </video>
        <div class="logo-row">
            <h2>Huba Huba</h2>
            <button id="themeToggle">◐</button>
        </div>
        <div class="profile-box">
           <input id="username" placeholder="Enter your name" autocomplete="off" autofocus />
           <input id="password" type="password" placeholder="Room password" autocomplete="off" class="hidden" />
           <div id="authError" class="auth-error hidden"></div>
        </div>
        <div class="online-section">
            <h3>Online</h3>
            <ul id="users"></ul>
        </div>
        <div class="admin-section hidden" id="adminSection">
            <h3>Admin</h3>
            <div class="admin-row">
                <input id="adminPassword" type="password" placeholder="New password" />
                <button id="setPasswordBtn">Set</button>
            </div>
            <button id="clearPasswordBtn" class="hidden admin-link">Remove password</button>
            <button id="endRoomBtn" class="admin-link end-room-btn">End Room</button>
        </div>
    </div>

    <!-- Main Area -->
    <div class="main-area">

        <!-- Top Bar -->
        <div class="top-bar">
            <button class="hamburger" id="hamburger" aria-label="Open menu">☰</button>
            <div class="chat-header"><h2 id="roomTitle">Huba Hmmss</h2></div>
            <!-- Top right menu -->
            <div class="top-menu" id="topMenu">
                <button class="top-menu-btn" id="topMenuBtn">≡</button>
                <div class="top-menu-dropdown hidden" id="topMenuDropdown">
                    <button id="exploreBtn" class="dropdown-item explore-item">🎬 Watch Together</button>
                    <button id="callBtn"    class="dropdown-item call-item">📹 Call</button>
                </div>
            </div>
        </div>

        <!-- Content Area -->
        <div class="content-area">

            <!-- Chat -->
            <div class="chat-container" id="chatSection">
                <div class="chat-container-inner">
                    <div id="chat"></div>
                    <div id="typingIndicator"></div>
                    <div id="emojiPicker" class="emoji-picker hidden">
                        <div class="emoji-grid"></div>
                    </div>
                    <form id="form">
                        <button type="button" id="emojiBtn">😊</button>
                        <input id="input" placeholder="Type a message..." autocomplete="off" />
                        <button type="submit">➤</button>
                    </form>
                </div>
            </div>

            <!-- Watch Together Panel -->
            <div class="video-panel hidden" id="videoPanel">
                <div class="video-url-bar">
                    <input id="videoInput" placeholder="Paste YouTube link or search..." autocomplete="off" />
                    <button id="loadVideoBtn">▶ Play</button>
                </div>
                <div id="searchResults" class="search-results hidden"></div>
                <div class="video-wrapper">
                    <div id="ytPlayer"></div>
                    <div class="video-empty" id="videoEmpty">
                        <div class="video-empty-icon">🎬</div>
                        <div class="video-empty-title">Watch Together</div>
                        <div class="video-empty-sub">Paste a YouTube link above or search for a video</div>
                    </div>
                </div>
                <div class="video-status" id="videoStatus">No video loaded</div>

                <!-- Queue Section -->
                <div class="video-queue" id="videoQueue">
                    <div class="video-queue-header" id="queueHeader">
                        <span class="queue-toggle" id="queueToggle">▾</span>
                        Up Next (<span id="queueCount">0</span>/6)
                    </div>
                    <div class="video-queue-items" id="queueItems"></div>
                </div>

                <!-- Bottom Section with tabs -->
                <div class="video-bottom" id="videoBottom">
                    <div class="video-bottom-resize" id="bottomResize"></div>
                    <div id="vchatMsgs"></div>
                    <div id="vchatTyping"></div>
                    <div id="vemojiPicker" class="vemoji-picker hidden"><div class="emoji-grid"></div></div>
                    <form id="vform">
                        <button type="button" id="vemojiBtn">😊</button>
                        <input id="vinput" placeholder="Type a message..." autocomplete="off" />
                        <button type="submit">➤</button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Incoming Call Overlay -->
<div class="incoming-call-overlay hidden" id="incomingCallOverlay">
    <div class="incoming-call-card">
        <div class="incoming-call-avatar" id="incomingCallAvatar">?</div>
        <div class="incoming-call-name" id="incomingCallName">Incoming Call</div>
        <div class="incoming-call-status" id="incomingCallStatus">is calling...</div>
        <div class="incoming-call-buttons">
            <button class="incoming-btn decline" id="declineCallBtn">✕ Decline</button>
            <button class="incoming-btn accept" id="acceptCallBtn">✓ Accept</button>
        </div>
    </div>
</div>

<!-- Call Panel — Picture in Picture (fallback for when video panel is closed) -->
<div class="call-panel hidden" id="callPanel">
    <div class="call-panel-header" id="callPanelHeader">
        <span>📹 Group Call &nbsp;<span class="call-count" id="callCount">0 in call</span></span>
        <div class="call-window-btns">
            <button id="minimizeCallBtn" class="win-btn win-min" title="Minimize">−</button>
            <button id="maximizeCallBtn" class="win-btn win-max" title="Maximize">□</button>
            <button id="closeCallBtn"    class="win-btn win-close" title="Close">✕</button>
        </div>
    </div>
    <div class="call-pip-row" id="callPipRow"></div>
    <div class="call-videos" id="callVideos"></div>
    <div class="call-controls">
        <button id="toggleMicBtn"    class="call-control-btn">🎤 Mute</button>
        <button id="toggleCameraBtn" class="call-control-btn">📷 Camera Off</button>
        <button id="joinCallBtn"     class="call-control-btn active">📹 Call</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="script.js"></script>
</body>
</html>
