<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Chat App</h1>

<div style="display:flex; gap:20px;">
    <div id="chat"></div>

    <div>
        <h3>Online Users</h3>
        <ul id="users"></ul>
    </div>
</div>

<form id="form">
    <input id="username" placeholder="Your name" autocomplete="off" />
    <input id="input" placeholder="Type message..." autocomplete="off" />
    <button>Send</button>
</form>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
